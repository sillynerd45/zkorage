# zkorage UX redesign — two comparison frontends (Variant A / Variant B) served side-by-side under the
# EXISTING prover-VM Cloudflare tunnel, alongside the live violet build (zkorage.wazowsky.id -> :4173).
#
#   zkorage-a.wazowsky.id -> http://localhost:4174  (zkorage-frontend-a, dist-a)
#   zkorage-b.wazowsky.id -> http://localhost:4175  (zkorage-frontend-b, dist-b)
#
# Separate compose project (name: zkorage-ab) so it never touches the main zkorage-web stack (backend +
# the :4173 frontend). Same backend apizk — no backend/contract changes.
#
# Deploy from the repo root on the VM (after the dist-a/dist-b builds are shipped):
#   docker compose -f docker-compose.ab.yml up -d --build
name: zkorage-ab

services:
  frontend-a:
    container_name: zkorage-frontend-a
    build:
      context: .
      dockerfile: deploy/frontend-a.Dockerfile
    restart: unless-stopped
    ports:
      - "4174:4174"

  frontend-b:
    container_name: zkorage-frontend-b
    build:
      context: .
      dockerfile: deploy/frontend-b.Dockerfile
    restart: unless-stopped
    ports:
      - "4175:4175"
