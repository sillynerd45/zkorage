# zkorage UNIFIED UX redesign — single preview frontend served under the EXISTING prover-VM Cloudflare
# tunnel at the zkorage-a.wazowsky.id route (-> http://localhost:4174). Replaces the throwaway A/B preview
# (docker-compose.ab.yml frontend-a/-b). Same backend apizk — no backend/contract changes. The live violet
# build at zkorage.wazowsky.id (:4173) is untouched until cutover.
#
# Deploy from the repo root on the VM (after the unified frontend/dist is shipped):
#   docker rm -f zkorage-frontend-a zkorage-frontend-b   # free :4174/:4175 from the old A/B preview
#   docker compose -f docker-compose.preview.yml up -d --build
name: zkorage-preview

services:
  frontend-preview:
    container_name: zkorage-frontend-preview
    build:
      context: .
      dockerfile: deploy/frontend-preview.Dockerfile
    restart: unless-stopped
    ports:
      - "4174:4174"
